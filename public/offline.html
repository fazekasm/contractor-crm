<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Contractor CRM</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 360px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #94a3b8; margin-bottom: 24px; }
    button { background: #4361ee; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Offline</h1>
    <p>No internet connection. Your data is saved locally and will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
